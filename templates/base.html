<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Una webapp premium per il Music Streaming Service.">
    <title>{% block title %}NomeSito{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">NomeSito</div>
        <div class="nav-links">
            <a href="{% url 'home' %}" class="btn">Home</a>
            <a href="{% url 'catalog_list' %}" class="btn">Catalogo</a>
            {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="btn">Login / Registrati</a>
            {% endif %}
        </div>
    </nav>
    <main class="app-container">
        {% block base_content %}
        {% endblock %}
    </main>
</body>

</html>
